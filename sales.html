<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التصفيات | Aura Outlet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="preloader"><div class="loader-text">AURA</div></div>

    <header class="scrolled">
        <div class="container">
            <nav>
                <div class="logo">AURA</div>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="shop.html">المجموعات</a></li>
                    <li><a href="sales.html" class="active">التصفيات</a></li>
                    <li><a href="about.html">الملف</a></li>
                    <li><a href="contact.html">اتصل</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main style="padding-top: 150px;">
        <section class="container">
            <h2 class="reveal" style="font-size: 3rem; color: var(--accent); margin-bottom: 50px;">تخفيضات حصرية</h2>
            <div class="product-grid">
                <article class="product-item reveal">
                    <div class="product-image">
                        <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=800&q=80" alt="Elegant Blouse">
                        <button class="add-btn" onclick="addToCart(3, 'بلوزة الأناقة الفاخرة', 290, 'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=800&q=80')">أضيفي للحقيبة</button>
                    </div>
                    <h3 style="font-size: 1.2rem; margin-bottom: 10px;">بلوزة الأناقة الفاخرة</h3>
                    <p style="color: var(--accent); font-weight: 700;"><span style="text-decoration: line-through; color: #999; font-size: 0.8rem; margin-left: 10px;">450 ر.س</span> 290 ر.س</p>
                </article>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
