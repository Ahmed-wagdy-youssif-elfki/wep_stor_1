<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل | Aura Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="preloader"><div class="loader-text">AURA</div></div>

    <header class="scrolled">
        <div class="container">
            <nav>
                <div class="logo">AURA</div>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="shop.html">المجموعات</a></li>
                    <li><a href="contact.html" class="active">اتصل</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main style="padding-top: 150px; padding-bottom: 100px;" class="container">
        <div style="max-width: 800px; margin: 0 auto; text-align: center;" class="reveal">
            <h2 style="font-size: 4rem; margin-bottom: 20px;">دعنا نتحدث</h2>
            <p style="color: var(--text-muted); margin-bottom: 60px;">فريقنا متاح دائماً لتقديم التوجيه والمساعدة في اختيار ما يناسبكِ.</p>
            
            <form action="#" method="POST" style="display: grid; gap: 30px; text-align: right;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <input type="text" placeholder="الاسم" required style="border: none; border-bottom: 1px solid #000; padding: 15px 0; background: transparent; outline: none; font-family: inherit;">
                    <input type="email" placeholder="البريد الإلكتروني" required style="border: none; border-bottom: 1px solid #000; padding: 15px 0; background: transparent; outline: none; font-family: inherit;">
                </div>
                <textarea placeholder="رسالتكِ.." rows="4" required style="border: none; border-bottom: 1px solid #000; padding: 15px 0; background: transparent; outline: none; font-family: inherit; resize: none;"></textarea>
                <button type="submit" class="btn-editorial" style="width: 200px; margin: 0 auto;">إرسال</button>
            </form>

            <div style="margin-top: 100px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; border-top: 1px solid var(--border); padding-top: 60px;">
                <div>
                    <h4 style="margin-bottom: 15px;">الهاتف</h4>
                    <p style="color: var(--text-muted);">+966 500 000 000</p>
                </div>
                <div>
                    <h4 style="margin-bottom: 15px;">البريد</h4>
                    <p style="color: var(--text-muted);">concierge@aura.com</p>
                </div>
                <div>
                    <h4 style="margin-bottom: 15px;">الموقع</h4>
                    <p style="color: var(--text-muted);">الرياض، المملكة العربية السعودية</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
